<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Job Board{% endblock %}</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/styles.css') }}">
    <style>
        /* Base styles */
        :root {
            --primary-color: #3490dc;
            --secondary-color: #38a169;
            --gray-light: #f3f4f6;
            --gray: #d1d5db;
            --gray-dark: #6b7280;
            --border-radius: 0.375rem;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            line-height: 1.5;
            color: #333;
            max-width: 1200px;
            margin: 0 auto;
            padding: 1rem;
        }

        /* Header styles */
        header {
            margin-bottom: 2rem;
        }

        h1 {
            color: var(--primary-color);
            margin-bottom: 0.5rem;
        }
        /* Add styles for disclaimer */
        .disclaimer {
            background-color: #fef6e4;
            border-left: 4px solid #f59e0b;
            padding: 1rem;
            margin-bottom: 2rem;
            border-radius: var(--border-radius);
            font-size: 0.9rem;
            line-height: 1.5;
        }

        .disclaimer p {
            margin: 0;
            color: #92400e;
        }

        /* Pagination styles */
        .pagination {
            margin-top: 2rem;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 1rem;
        }

        .pagination-info {
            color: var(--gray-dark);
            font-size: 0.9rem;
        }

        .pagination-controls {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 0.5rem;
        }

        .pagination-link {
            display: inline-block;
            padding: 0.5rem 0.75rem;
            border: 1px solid var(--gray);
            border-radius: var(--border-radius);
            text-decoration: none;
            color: var(--primary-color);
            min-width: 2.5rem;
            text-align: center;
            transition: all 0.2s;
        }

        .pagination-link:hover:not(.disabled):not(.current) {
            background-color: var(--gray-light);
            border-color: var(--primary-color);
        }

        .pagination-link.current {
            background-color: var(--primary-color);
            color: white;
            border-color: var(--primary-color);
            font-weight: 600;
        }

        .pagination-link.disabled {
            color: var(--gray);
            cursor: not-allowed;
        }

        .pagination-ellipsis {
            display: inline-block;
            padding: 0.5rem 0.25rem;
            color: var(--gray-dark);
        }

        /* Filter section */
        .filter-section {
            background-color: var(--gray-light);
            padding: 1rem;
            border-radius: var(--border-radius);
            margin-bottom: 2rem;
        }

        .filter-form {
            display: flex;
            flex-wrap: wrap;
            gap: 1rem;
            align-items: flex-end;
        }

        .filter-group {
            display: flex;
            flex-direction: column;
            min-width: 150px;
        }

        .filter-group label {
            font-size: 0.875rem;
            margin-bottom: 0.25rem;
            font-weight: 500;
        }

        .filter-group input[type="number"] {
            padding: 0.5rem;
            border: 1px solid var(--gray);
            border-radius: var(--border-radius);
        }

        .filter-group .checkbox-wrapper {
            display: flex;
            align-items: center;
        }

        .filter-group .checkbox-wrapper input[type="checkbox"] {
            margin-right: 0.5rem;
        }

        .tag-filters {
            display: flex;
            flex-wrap: wrap;
            gap: 0.5rem;
            margin-top: 0.5rem;
        }

        .tag-checkbox {
            display: none;
        }

        .tag-label {
            display: inline-block;
            background-color: #e5e7eb;
            color: #4b5563;
            padding: 0.25rem 0.75rem;
            border-radius: 1rem;
            font-size: 0.875rem;
            cursor: pointer;
            transition: all 0.2s;
        }

        .tag-checkbox:checked + .tag-label {
            background-color: var(--primary-color);
            color: white;
        }

        button.filter-button {
            background-color: var(--primary-color);
            color: white;
            border: none;
            padding: 0.5rem 1rem;
            border-radius: var(--border-radius);
            cursor: pointer;
            font-weight: 500;
            transition: background-color 0.2s;
        }

        button.filter-button:hover {
            background-color: #2779bd;
        }

        /* Job listings */
        .job-listings {
            display: grid;
            grid-template-columns: 1fr;
            gap: 1.5rem;
        }

        @media (min-width: 768px) {
            .job-listings {
                grid-template-columns: repeat(auto-fill, minmax(350px, 1fr));
            }
        }

        .job-card {
            border: 1px solid var(--gray);
            border-radius: var(--border-radius);
            padding: 1.25rem;
            transition: all 0.2s;
            display: flex;
            flex-direction: column;
            height: 100%;
        }

        .job-card:hover {
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
            transform: translateY(-2px);
        }

        .job-title {
            font-size: 1.25rem;
            font-weight: 600;
            color: var(--primary-color);
            margin-bottom: 0.5rem;
            text-decoration: none;
        }

        .job-title:hover {
            text-decoration: underline;
        }

        .job-description {
            color: var(--gray-dark);
            margin-bottom: 1rem;
            flex-grow: 1;
        }

        .job-meta {
            margin-top: auto;
        }

        .job-salary {
            font-weight: 600;
            color: var(--secondary-color);
            margin-bottom: 0.5rem;
        }

        .job-badges {
            display: flex;
            flex-wrap: wrap;
            gap: 0.5rem;
            margin-bottom: 0.75rem;
        }

        .badge {
            display: inline-flex;
            align-items: center;
            background-color: var(--gray-light);
            padding: 0.25rem 0.5rem;
            border-radius: 0.25rem;
            font-size: 0.75rem;
            font-weight: 500;
        }

        .badge.remote {
            background-color: #ebf4ff;
            color: #3182ce;
        }

        .badge.remote::before {
            content: "✓";
            margin-right: 0.25rem;
        }

        .job-tags {
            display: flex;
            flex-wrap: wrap;
            gap: 0.5rem;
        }

        .job-tag {
            background-color: #ebf8ff;
            color: #2b6cb0;
            padding: 0.25rem 0.5rem;
            border-radius: 0.25rem;
            font-size: 0.75rem;
            text-decoration: none;
        }

        .job-tag:hover {
            background-color: #bee3f8;
        }

        .no-jobs-message {
            grid-column: 1 / -1;
            text-align: center;
            padding: 2rem;
            background-color: var(--gray-light);
            border-radius: var(--border-radius);
        }
    </style>
</head>
<body>
    <header>
        <h1>Job Board</h1>
        <p>Find your job as per your preferences</p>
    </header>

    <main>
        {% block content %}{% endblock %}
    </main>

    <script>
        document.addEventListener('DOMContentLoaded', function() {
            // Enable form submission when tags are clicked
            const tagInputs = document.querySelectorAll('.tag-checkbox');
            tagInputs.forEach(input => {
                input.addEventListener('change', function() {
                    document.getElementById('filter-form').submit();
                });
            });
        });
    </script>
</body>
</html>
